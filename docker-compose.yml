services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (опционально)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    env_file: .env
    networks:
      - app-network
  
  db:
    image: postgres:16
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  adminer:
    image: adminer:latest
    container_name: adminer_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    networks:
      - app-network

  backend:
    image: nelo05/rksp_kursach-backend:latest
    env_file: .env
    container_name: fastapi_app_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
      build: ./frontend
      ports:
        - "3000:80"
      env_file: .env
      # depends_on:
      #   - backend
      networks:
      - app-network

networks:
  app-network:
    driver: bridge